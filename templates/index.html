<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegetation Detection</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>🌿 Vegetation Detection System</h1>
    <p class="subtitle">AI-powered vegetation analysis</p>

    <!-- Upload Form -->
    <form method="POST" enctype="multipart/form-data" class="upload-box" onsubmit="showLoader()">
        <input type="file" name="image" accept="image/*" required>
        <button type="submit">Predict</button>
    </form>

    <!-- Loader -->
    <div id="loader">🔄 Processing...</div>

    <!-- Result -->
    {% if prediction %}
    <div class="result-box {% if 'Danger' in prediction %}danger{% else %}safe{% endif %}">
        {{ prediction }}
    </div>
    {% endif %}

    <!-- Images -->
    {% if uploaded_image or output_image %}
    <div class="image-container">

        {% if uploaded_image %}
        <div class="card">
            <h3>📷 Uploaded Image</h3>
            <img src="{{ uploaded_image }}">
        </div>
        {% endif %}

        {% if output_image %}
        <div class="card">
            <h3>🤖 Detection Result</h3>
            <img src="{{ output_image }}">
        </div>
        {% endif %}

    </div>
    {% endif %}

</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
