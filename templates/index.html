<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegetation Detection</title>

```
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
```

</head>
<body>

<div class="container">

```
<h2>🌿 Vegetation Detection System</h2>

<!-- Upload Form -->
<form method="POST" enctype="multipart/form-data">
    <input type="file" name="image" accept="image/*" required>
    <button type="submit">Predict</button>
</form>

<!-- Prediction Text -->
{% if prediction %}
    <h3 class="prediction-text">Result: {{ prediction }}</h3>
{% endif %}

<!-- Images Section -->
{% if uploaded_image or output_image %}
<div class="image-container">

    {% if uploaded_image %}
    <div class="image-box">
        <h3>Uploaded Image</h3>
        <img src="{{ uploaded_image }}">
    </div>
    {% endif %}

    {% if output_image %}
    <div class="image-box">
        <h3>Detection Result</h3>
        <img src="{{ output_image }}">
    </div>
    {% endif %}

</div>
{% endif %}
```

</div>

</body>
</html>
